name: Publish documentation

on:
    workflow_run:
        workflows: ['Release']
        types: ['completed']

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.status == 'completed' && github.event.workflow_run.conclusion == 'success') }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Checkout latest tag
              run: |
                  git fetch --tags --prune
                  LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
                  if [ -n "$LATEST_TAG" ]; then
                      git checkout "$LATEST_TAG"
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'npm'

            # See https://docs.github.com/en/actions/using-workflows/caching-dependencies-to-speed-up-workflows
            - name: Cache node modules
              id: cache-npm
              uses: actions/cache@v5
              env:
                  cache-name: cache-node-modules
              with:
                  # npm cache files are stored in `~/.npm` on Linux/macOS
                  path: ~/.npm
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ env.cache-name }}-
                      ${{ runner.os }}-build-
                      ${{ runner.os }}-

            - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
              name: List the state of node modules
              continue-on-error: true
              run: npm list

            - name: Install dependencies
              run: npm ci

            - name: Generate API documentation
              run: npm run docs:api

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.10'

            - name: Install documentation dependencies
              run: pip install -r requirements.mkdocs.txt

            - name: Build MkDocs site
              run: mkdocs build --strict

            - name: Setup GitHub Pages
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: static

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
